<!DOCTYPE html>
<html lang="uz" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Kawai Shop" />
    <link rel="manifest" href="/site.webmanifest" />

    <title>Katalog | Kiyim, Aksessuar va Go'zallik Mahsulotlari | Kawai Shop</title>
    <meta
      name="description"
      content="Kawai Shop katalogi — qizlar uchun kiyim, aksessuar, sumka, kosmetika, parfyum va zargarlik mahsulotlari. Sevimli mahsulotlaringizni onlayn tanlang."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/output.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <style>
      :root {
        --kc-pink-1: #ff6fa5;
        --kc-pink-2: #ff4d8d;
        --kc-coral: #ff8a7a;
        --kc-lilac: #b48cff;
        --kc-cream: #fff1f6;
        --kc-ink: #2b0f1f;
      }

      body { font-family: 'Nunito', sans-serif; }

      .logo-text {
        font-family: 'Fredoka', sans-serif;
        background: linear-gradient(135deg, #ffb3d1, #ff4d8d, #b48cff);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text; font-weight: 700; letter-spacing: -0.01em;
      }

      /* ═══════════ CATALOG HERO STRIP ═══════════ */
      .kc-hero {
        position: relative;
        border-radius: 28px;
        padding: 1.6rem 1.3rem 1.5rem;
        overflow: hidden;
        background:
          radial-gradient(120% 140% at 0% 0%, rgba(255,111,165,.30), transparent 55%),
          radial-gradient(100% 120% at 100% 100%, rgba(180,140,255,.22), transparent 55%),
          linear-gradient(165deg, rgba(30,10,24,.9), rgba(18,6,16,.96));
        border: 1px solid rgba(255,140,180,.16);
      }
      .kc-hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          radial-gradient(circle, rgba(255,255,255,.5) 1.5px, transparent 1.5px);
        background-size: 26px 26px;
        opacity: .05;
        pointer-events: none;
      }
      .kc-hero-eyebrow {
        font-size: .68rem;
        font-weight: 800;
        letter-spacing: .18em;
        text-transform: uppercase;
        color: #ffb3d1;
        display: flex;
        align-items: center;
        gap: .4rem;
      }
      .kc-hero-eyebrow .dot {
        width: 5px; height: 5px; border-radius: 50%;
        background: #ff4d8d;
        box-shadow: 0 0 8px rgba(255,77,141,.8);
      }
      .kc-hero-title {
        font-family: 'Fredoka', sans-serif;
        font-size: clamp(1.5rem, 3vw + 1rem, 2.2rem);
        font-weight: 700;
        color: #fff;
        margin-top: .35rem;
        letter-spacing: -.01em;
        line-height: 1.15;
      }
      .kc-hero-sub {
        font-size: .82rem;
        color: rgba(255,230,240,.55);
        margin-top: .3rem;
        max-width: 30ch;
      }
      .kc-hero-count {
        position: absolute;
        right: 1.2rem;
        top: 1.3rem;
        text-align: right;
      }
      .kc-hero-count .n {
        font-family: 'Fredoka', sans-serif;
        font-size: 1.7rem;
        font-weight: 600;
        color: #fff;
        line-height: 1;
      }
      .kc-hero-count .l {
        font-size: .6rem;
        font-weight: 700;
        letter-spacing: .08em;
        text-transform: uppercase;
        color: rgba(255,230,240,.45);
      }

      /* ═══════════ SEARCH ═══════════ */
      .kc-search-row {
        display: flex;
        gap: .55rem;
        margin-top: 1rem;
      }
      .kc-search-wrap {
        position: relative;
        flex: 1;
      }
      .kc-search-wrap svg {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: rgba(255,179,209,.55);
        pointer-events: none;
      }
      #searchInputCatalog {
        width: 100%;
        padding: .75rem 1rem .75rem 2.6rem;
        border-radius: 16px;
        font-size: .85rem;
        background: rgba(255,255,255,.04) !important;
        border: 1px solid rgba(255,140,180,.14) !important;
        color: #fff !important;
      }
      #searchInputCatalog::placeholder { color: rgba(255,230,240,.32); }
      #searchInputCatalog:focus {
        border-color: rgba(255,111,165,.45) !important;
        box-shadow: 0 0 0 3px rgba(255,77,141,.12) !important;
      }
      #searchClearCatalog {
        padding: 0 1.1rem;
        border-radius: 16px;
        font-size: .76rem;
        font-weight: 700;
        background: rgba(255,255,255,.03) !important;
        border: 1px solid rgba(255,140,180,.14) !important;
        color: rgba(255,230,240,.65) !important;
        white-space: nowrap;
      }
      #searchClearCatalog:hover { border-color: rgba(255,111,165,.4) !important; }

      /* ═══════════ CATEGORY TABS — signature element ═══════════
         "Sticker tape" tabs: torn-edge feel via clip-path,
         tilt slightly, lift + straighten on hover/active.        */
      .kc-cat-scroller {
        display: flex;
        gap: .55rem;
        overflow-x: auto;
        padding: .3rem .1rem 1rem;
        margin-top: 1.1rem;
        scrollbar-width: none;
      }
      .kc-cat-scroller::-webkit-scrollbar { display: none; }

      .kc-tab {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: .4rem;
        padding: .58rem 1rem .58rem .8rem;
        border-radius: 13px;
        font-family: 'Fredoka', sans-serif;
        font-size: .78rem;
        font-weight: 600;
        color: rgba(255,235,243,.78);
        background: rgba(255,255,255,.03);
        border: 1.5px dashed rgba(255,140,180,.22);
        cursor: pointer;
        white-space: nowrap;
        transition: transform .18s ease, border-color .18s ease, background .18s ease, color .18s ease;
        transform: rotate(var(--tilt, 0deg));
      }
      .kc-tab:nth-child(odd)  { --tilt: -1.1deg; }
      .kc-tab:nth-child(even) { --tilt: 1.1deg; }

      .kc-tab .ico { font-size: .95rem; }

      .kc-tab:hover {
        transform: rotate(0deg) translateY(-2px);
        border-color: rgba(255,111,165,.4);
        color: #fff;
      }

      .kc-tab.active {
        transform: rotate(0deg);
        background: linear-gradient(135deg, #ff4d8d, #ff8a7a);
        border-style: solid;
        border-color: transparent;
        color: #fff;
        box-shadow: 0 6px 18px rgba(255,77,141,.35);
      }
      .kc-tab.active .ico { filter: drop-shadow(0 1px 2px rgba(0,0,0,.2)); }

      /* ═══════════ SORT ROW ═══════════ */
      .kc-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: .75rem;
        margin-bottom: .2rem;
      }
      .kc-result-label {
        font-size: .76rem;
        color: rgba(255,230,240,.40);
        font-weight: 600;
      }
      .kc-result-label b { color: #ffb3d1; font-weight: 800; }

      /* ═══════════ EMPTY STATE override ═══════════ */
      #error-box {
        font-family: 'Nunito', sans-serif;
      }
    </style>
      <style id="kc-loader-style">
      #kc-page-loader {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 1.1rem;
        background:
          radial-gradient(800px 500px at 5% 0%, rgba(225,29,132,.18), transparent 55%),
          radial-gradient(600px 400px at 95% 5%, rgba(192,38,211,.12), transparent 50%),
          linear-gradient(180deg, #0f0812 0%, #150d1a 100%);
        transition: opacity .32s ease, visibility .32s ease;
      }
      #kc-page-loader.kc-hidden {
        opacity: 0; visibility: hidden; pointer-events: none;
      }
      .kc-loader-logo {
        font-family: "Fredoka", "Nunito", sans-serif;
        font-size: 1.35rem; font-weight: 700;
        background: linear-gradient(135deg, #ffb3d1, #ff4d8d, #b48cff);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text; letter-spacing: -.01em;
      }
      .kc-spinner-ring { position: relative; width: 54px; height: 54px; }
      .kc-spinner-ring svg {
        position: absolute; inset: 0; width: 100%; height: 100%;
        animation: kc-spin 1s linear infinite;
      }
      .kc-spinner-ring svg circle { fill: none; stroke-width: 3.5; stroke-linecap: round; }
      .kc-spinner-ring svg .kc-track { stroke: rgba(255,180,210,.10); }
      .kc-spinner-ring svg .kc-arc {
        stroke: url(#kc-grad);
        stroke-dasharray: 110 200;
        animation: kc-spin 1s linear infinite, kc-dash .9s ease-in-out infinite alternate;
      }
      @keyframes kc-spin { 100% { transform: rotate(360deg); } }
      @keyframes kc-dash {
        from { stroke-dasharray: 20 200; }
        to   { stroke-dasharray: 120 200; }
      }
      .kc-loader-dots { display: flex; gap: .4rem; }
      .kc-loader-dots span {
        width: 5px; height: 5px; border-radius: 50%;
        background: rgba(255,140,180,.5);
        animation: kc-dot .9s ease-in-out infinite;
      }
      .kc-loader-dots span:nth-child(1) { animation-delay: 0s; }
      .kc-loader-dots span:nth-child(2) { animation-delay: .18s; }
      .kc-loader-dots span:nth-child(3) { animation-delay: .36s; }
      @keyframes kc-dot {
        0%, 100% { transform: scale(.7); opacity: .35; }
        50%       { transform: scale(1.2); opacity: 1; background: #ff4d8d; }
      }
    </style>
  </head>
  <body class="anime-bg text-white">
    <!-- PAGE LOADER -->
    <div id="kc-page-loader" role="status" aria-label="Yuklanmoqda">
      <svg width="0" height="0" style="position:absolute">
        <defs>
          <linearGradient id="kc-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#ffb3d1"/>
            <stop offset="50%"  stop-color="#ff4d8d"/>
            <stop offset="100%" stop-color="#b48cff"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="kc-spinner-ring">
        <svg viewBox="0 0 54 54">
          <circle class="kc-track" cx="27" cy="27" r="23"/>
          <circle class="kc-arc"   cx="27" cy="27" r="23"/>
        </svg>
      </div>
      <div class="kc-loader-logo">🌸 Kawai Shop</div>
      <div class="kc-loader-dots"><span></span><span></span><span></span></div>
    </div>
    <script>
      (function(){
        var el = document.getElementById("kc-page-loader");
        function hide(){ if(el) el.classList.add("kc-hidden"); }
        if(document.readyState === "complete"){ setTimeout(hide, 180); }
        else { window.addEventListener("load", function(){ setTimeout(hide, 220); }); }
        setTimeout(hide, 3500);
      })();
    </script>

    <!-- MOBILE HEADER -->
    <header class="fixed top-0 z-50 flex h-14 w-full items-center glass-soft px-4 md:hidden" style="border-bottom:1px solid rgba(225,29,132,.10);">
      <a href="index.html" class="logo-text text-lg">🌸 Kawai Shop</a>
    </header>

    <!-- DESKTOP HEADER -->
    <header class="sticky top-0 z-50 hidden glass-soft backdrop-blur md:block" style="border-bottom:1px solid rgba(225,29,132,.08);">
      <div class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-4 px-4 py-4">
        <a href="index.html" class="logo-text text-xl">🌸 Kawai Shop</a>
        <nav class="flex flex-1 flex-wrap items-center gap-3">
          <a href="index.html" class="text-sm text-pink-200/70 hover:text-white" data-i18n="home"></a>
          <a href="catalog.html" class="text-sm text-pink-200/70 hover:text-white" data-i18n="catalog"></a>
          <a href="seller.html" class="text-sm text-pink-200/70 hover:text-white" data-i18n="seller_panel"></a>
          <a href="about.html" class="text-sm text-pink-200/70 hover:text-white" data-i18n="about"></a>
        </nav>
        <div class="flex items-center gap-4 text-sm">
          <a href="cart.html" class="relative">
            🛍️
            <span class="absolute -right-2 -top-2 flex h-5 w-5 items-center justify-center rounded-full bg-pink-500 text-xs font-semibold text-white" data-cart-count>0</span>
          </a>
          <a href="account.html" class="text-pink-200/70 hover:text-white" data-i18n="account"></a>
          <select data-lang-switch class="rounded-lg border border-slate-800 bg-slate-900 px-2 py-1 text-xs text-white">
            <option value="uz">UZ</option>
            <option value="ru">RU</option>
          </select>
        </div>
      </div>
    </header>

    <main class="bottom-safe mx-auto max-w-6xl space-y-6 px-4 pb-32 pt-14 md:pt-20">

      <!-- HERO STRIP -->
      <section class="kc-hero">
        <div class="kc-hero-eyebrow"><span class="dot"></span>Katalog</div>
        <h1 class="kc-hero-title">Sevib qoladigan<br/>narsalar shu yerda</h1>
        <p class="kc-hero-sub">Kiyim, aksessuar va go'zallik — barchasi bitta joyda</p>
        <div class="kc-hero-count">
          <div class="n" id="kc-total-count">—</div>
          <div class="l">mahsulot</div>
        </div>
      </section>

      <!-- SEARCH -->
      <section>
        <div class="kc-search-row">
          <div class="kc-search-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
            <input
              id="searchInputCatalog"
              type="search"
              placeholder="Nima izlayapsiz?"
            />
          </div>
          <button id="searchClearCatalog" type="button">Tozalash</button>
        </div>

        <!-- CATEGORY TABS (signature element) -->
        <div class="kc-cat-scroller">
          <button class="kc-tab category-chip active" data-category="all" aria-pressed="true">
            <span class="ico">✨</span><span>Barchasi</span>
          </button>
          <button class="kc-tab category-chip" data-category="Kiyim" aria-pressed="false">
            <span class="ico">👗</span><span>Kiyim</span>
          </button>
          <button class="kc-tab category-chip" data-category="Aksessuar" aria-pressed="false">
            <span class="ico">💍</span><span>Aksessuar</span>
          </button>
          <button class="kc-tab category-chip" data-category="Sumka" aria-pressed="false">
            <span class="ico">👜</span><span>Sumka</span>
          </button>
          <button class="kc-tab category-chip" data-category="Kosmetika" aria-pressed="false">
            <span class="ico">💄</span><span>Kosmetika</span>
          </button>
          <button class="kc-tab category-chip" data-category="Parfyum" aria-pressed="false">
            <span class="ico">🌸</span><span>Parfyum</span>
          </button>
          <button class="kc-tab category-chip" data-category="Zargarlik" aria-pressed="false">
            <span class="ico">✨</span><span>Zargarlik</span>
          </button>
          <button class="kc-tab category-chip" data-category="Uy" aria-pressed="false">
            <span class="ico">🕯️</span><span>Uy</span>
          </button>
          <button class="kc-tab category-chip" data-category="Kitob" aria-pressed="false">
            <span class="ico">📖</span><span>Kitob</span>
          </button>
        </div>
      </section>

      <!-- PRODUCTS -->
      <section id="catalog" class="space-y-5">
        <div class="kc-toolbar">
          <p class="kc-result-label" data-i18n="catalog_subtitle"></p>
        </div>

        <div id="error-box" class="hidden rounded-2xl px-4 py-3 text-sm" style="background:rgba(239,68,68,.08);color:#fca5a5;border:1px solid rgba(239,68,68,.16);border-radius:18px;"></div>

        <div
          id="product-list"
          class="products-grid grid grid-cols-2 items-start gap-4 md:grid-cols-3 lg:grid-cols-4"
          style="grid-auto-rows: max-content;"
        ></div>

        <div id="loader" class="flex justify-center">
          <div class="h-10 w-10 animate-spin rounded-full border-4 border-pink-200/20 border-t-pink-400/70"></div>
        </div>
        <div id="sentinel" class="h-4"></div>
      </section>
    </main>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav fixed bottom-0 left-0 right-0 z-50 glass-soft md:hidden">
      <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-3 text-xs">
        <a href="index.html" class="nav-item">
          <span>🏠</span>
          <span data-i18n="home"></span>
        </a>
        <a href="catalog.html" class="nav-item active text-white">
          <span>🛍️</span>
          <span data-i18n="catalog"></span>
        </a>
        <a href="cart.html" class="nav-item relative">
          <span>🛒</span>
          <span data-i18n="cart"></span>
          <span class="absolute -right-2 -top-1 flex h-5 w-5 items-center justify-center rounded-full bg-pink-500 text-[10px] font-semibold text-white" data-cart-count>0</span>
        </a>
        <a href="account.html" class="nav-item">
          <span>👤</span>
          <span data-i18n="account"></span>
        </a>
      </div>
    </nav>

    <script>
      // Update active tab styling + result count to match catalog.js's
      // .category-chip click handling (it toggles aria-pressed already).
      document.addEventListener('click', (e) => {
        const tab = e.target.closest('.kc-tab');
        if (!tab) return;
        document.querySelectorAll('.kc-tab').forEach((t) => t.classList.remove('active'));
        tab.classList.add('active');
      });

      // Live product count for hero strip
      const updateKcCount = () => {
        const el = document.getElementById('kc-total-count');
        const list = document.getElementById('product-list');
        if (el && list) el.textContent = list.children.length || '—';
      };
      const kcObserver = new MutationObserver(updateKcCount);
      const productListEl = document.getElementById('product-list');
      if (productListEl) kcObserver.observe(productListEl, { childList: true });
    </script>

    <script type="module" src="js/catalog.js"></script>
  </body>
</html>
