<!DOCTYPE html>
<html lang="uz" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anime Shop — Savat</title>

    <link rel="stylesheet" href="css/output.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <style>
      /* ══════════════════════════════
         CART PAGE — PREMIUM DESIGN
      ══════════════════════════════ */

      /* Page heading */
      .cart-hd {
        padding: 12px 0 10px;
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid rgba(255,255,255,.06);
        margin-bottom: 4px;
      }
      .cart-hd h1 {
        font-size: 19px;
        font-weight: 900;
        color: #fff;
        letter-spacing: -.02em;
      }
      .cart-count-badge {
        background: linear-gradient(135deg,#7c3aed,#c084fc);
        border-radius: 999px;
        padding: 2px 11px;
        font-size: 11px;
        font-weight: 800;
        color: #fff;
        box-shadow: 0 2px 8px rgba(124,58,237,.3);
      }

      /* Empty state */
      .cart-empty {
        text-align: center;
        padding: 56px 20px;
        background:
          linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.01)),
          linear-gradient(180deg, rgba(18,14,42,.6), rgba(5,7,20,.65));
        border: 1px solid rgba(255,255,255,.07);
        border-radius: 24px;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
      }
      .cart-empty .ico { font-size: 54px; display: block; margin-bottom: 14px; }
      .cart-empty-ttl { font-size: 17px; font-weight: 900; color: #fff; }
      .cart-empty-sub { font-size: 13px; color: rgba(247,244,255,.4); margin-top: 6px; }
      .cart-empty-btn {
        display: inline-block;
        margin-top: 20px;
        background: linear-gradient(135deg,#7c3aed,#c084fc);
        border-radius: 14px;
        padding: 11px 28px;
        font-size: 13px;
        font-weight: 800;
        color: #fff;
        text-decoration: none;
        box-shadow: 0 6px 20px rgba(124,58,237,.3);
        transition: filter .17s, transform .17s;
      }
      .cart-empty-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }

      /* Cart item card */
      .cart-item {
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 12px;
        border-radius: 20px;
        background:
          linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.01)),
          linear-gradient(180deg, rgba(18,14,42,.6), rgba(5,7,20,.65));
        border: 1px solid rgba(255,255,255,.07);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        margin-bottom: 12px;
        transition: border-color .2s;
      }
      .cart-item:hover { border-color: rgba(168,85,247,.25); }

      .cart-item-img {
        width: 76px; height: 76px;
        border-radius: 16px;
        background: rgba(255,255,255,.04);
        border: 1px solid rgba(255,255,255,.08);
        flex-shrink: 0;
        overflow: hidden;
        display: flex; align-items: center; justify-content: center;
        padding: 6px;
      }
      .cart-item-img img { width: 100%; height: 100%; object-fit: contain; border-radius: 10px; }

      .cart-item-info { flex: 1; min-width: 0; }
      .cart-item-title {
        font-size: 13.5px; font-weight: 800; color: #fff;
        line-height: 1.3;
        display: -webkit-box;
        -webkit-line-clamp: 2; -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .cart-item-cat { font-size: 11px; color: rgba(247,244,255,.4); margin-top: 3px; }
      .cart-item-variant {
        display: inline-flex; align-items: center;
        margin-top: 6px;
        padding: 2px 9px;
        border-radius: 999px;
        background: rgba(168,85,247,.12);
        border: 1px solid rgba(168,85,247,.22);
        font-size: 10.5px; font-weight: 700; color: #c084fc;
      }
      .cart-item-price {
        font-size: 14px; font-weight: 900; color: #fff;
        margin-top: 6px;
      }

      /* Right column: qty + remove */
      .cart-item-right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
        flex-shrink: 0;
      }
      .qty-stepper {
        display: flex;
        align-items: center;
        gap: 0;
        background: rgba(255,255,255,.04);
        border: 1px solid rgba(255,255,255,.09);
        border-radius: 12px;
        overflow: hidden;
      }
      .qty-btn {
        width: 30px; height: 30px;
        display: flex; align-items: center; justify-content: center;
        background: transparent;
        border: none;
        color: rgba(247,244,255,.7);
        font-size: 16px; font-weight: 700;
        cursor: pointer;
        transition: background .15s, color .15s;
      }
      .qty-btn:hover { background: rgba(168,85,247,.15); color: #c084fc; }
      .qty-val {
        min-width: 28px;
        text-align: center;
        font-size: 13px; font-weight: 800; color: #fff;
      }
      .remove-btn {
        display: flex; align-items: center; gap: 4px;
        font-size: 11px; font-weight: 700;
        color: #f87171;
        background: rgba(239,68,68,.08);
        border: 1px solid rgba(239,68,68,.18);
        border-radius: 10px;
        padding: 5px 10px;
        cursor: pointer;
        transition: background .17s;
      }
      .remove-btn:hover { background: rgba(239,68,68,.16); }

      /* ══ BOTTOM SECTION ══ */
      .cart-bottom-sec { margin-top: 4px; }

      /* Promo card */
      .promo-card {
        background:
          linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.01)),
          linear-gradient(180deg, rgba(18,14,42,.6), rgba(5,7,20,.65));
        border: 1px solid rgba(255,255,255,.07);
        border-radius: 20px;
        padding: 16px;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        margin-bottom: 12px;
      }
      .promo-card h2 {
        font-size: 13px; font-weight: 800; color: #fff;
        display: flex; align-items: center; gap: 8px;
        margin-bottom: 10px;
      }
      .promo-row { display: flex; gap: 8px; }
      .promo-input {
        flex: 1;
        background: rgba(255,255,255,.04) !important;
        border: 1px solid rgba(255,255,255,.09) !important;
        border-radius: 12px !important;
        padding: 11px 14px;
        font-size: 13px;
        color: #fff !important;
      }
      .promo-input::placeholder { color: rgba(247,244,255,.32); }
      .promo-btn {
        padding: 11px 20px;
        border-radius: 12px;
        background: linear-gradient(135deg,#7c3aed,#c084fc);
        border: none;
        color: #fff;
        font-size: 13px; font-weight: 800;
        cursor: pointer;
        white-space: nowrap;
        transition: filter .17s, transform .17s;
        box-shadow: 0 4px 14px rgba(124,58,237,.3);
      }
      .promo-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }

      /* Summary card */
      .summary-card {
        background:
          linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.01)),
          linear-gradient(180deg, rgba(18,14,42,.6), rgba(5,7,20,.65));
        border: 1px solid rgba(255,255,255,.07);
        border-radius: 20px;
        padding: 16px;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
      }
      .summary-row {
        display: flex; align-items: center; justify-content: space-between;
        padding: 7px 0;
        font-size: 13px;
        color: rgba(247,244,255,.65);
      }
      .summary-row .val { font-weight: 700; color: #fff; }
      .summary-row.discount .val { color: #4ade80; }
      .summary-divider {
        height: 1px;
        background: rgba(255,255,255,.07);
        margin: 8px 0;
      }
      .summary-total {
        display: flex; align-items: center; justify-content: space-between;
        padding: 6px 0 4px;
      }
      .summary-total .lbl { font-size: 14px; font-weight: 800; color: rgba(247,244,255,.85); }
      .summary-total .val { font-size: 21px; font-weight: 900; color: #fff; letter-spacing: -.01em; }
      .checkout-btn {
        display: flex; align-items: center; justify-content: center; gap: 8px;
        width: 100%;
        margin-top: 14px;
        padding: 14px;
        border-radius: 16px;
        background: linear-gradient(135deg,#7c3aed,#c084fc);
        font-size: 14px; font-weight: 900; color: #fff;
        text-decoration: none;
        box-shadow: 0 8px 24px rgba(124,58,237,.35);
        transition: filter .17s, transform .17s;
      }
      .checkout-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }

      /* skeleton override */
      #cart-list .skeleton { border-radius: 20px; }
    </style>
  </head>
  <body class="theme-bg text-white">

    <!-- ══ MOBILE HEADER ══ -->
    <header class="fixed top-0 z-50 flex h-14 w-full items-center px-4 md:hidden"
      style="background:rgba(7,8,20,.95);border-bottom:1px solid rgba(255,255,255,.06);">
      <a href="index.html" class="text-lg font-semibold text-white">Anime Shop</a>
    </header>

    <!-- ══ DESKTOP HEADER ══ -->
    <header class="hidden md:block" style="background:rgba(7,8,20,.95);border-bottom:1px solid rgba(255,255,255,.06);">
      <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
        <a href="index.html" class="text-xl font-bold text-white">Anime Shop</a>
        <nav class="flex items-center gap-3 text-sm">
          <a href="index.html" class="text-slate-200 hover:text-white" data-i18n="home"></a>
          <a href="catalog.html" class="text-slate-200 hover:text-white" data-i18n="catalog"></a>
        </nav>
        <div class="flex items-center gap-4 text-sm">
          <a href="cart.html" class="relative">
            🛒
            <span class="absolute -right-2 -top-2 flex h-5 w-5 items-center justify-center rounded-full bg-white text-xs font-semibold text-slate-900" data-cart-count>0</span>
          </a>
          <a href="account.html" class="text-slate-200 hover:text-white" data-i18n="account"></a>
          <select data-lang-switch class="rounded-lg border border-slate-800 bg-slate-900 px-2 py-1 text-xs text-white">
            <option value="uz">UZ</option>
            <option value="ru">RU</option>
          </select>
        </div>
      </div>
    </header>

    <main class="bottom-safe mx-auto max-w-6xl px-4 pt-14 pb-8 md:pt-20">

      <!-- Heading -->
      <div class="cart-hd">
        <h1 data-i18n="cart_title">Savat</h1>
        <span class="cart-count-badge" id="cart-count-badge">0</span>
      </div>

      <section class="flex flex-col gap-4 mt-4">
        <!-- Empty state -->
        <div id="empty-state" class="hidden cart-empty" data-i18n="cart_empty_text">
          <span class="ico">🛒</span>
          <div class="cart-empty-ttl">Savatingiz bo'sh</div>
          <div class="cart-empty-sub">Katalogga o'tib, sevimli mahsulotlaringizni qo'shing</div>
          <a href="catalog.html" class="cart-empty-btn">🛍️ Katalogga o'tish</a>
        </div>

        <!-- Items -->
        <div id="cart-list"></div>
      </section>

      <!-- Promo + Summary -->
      <section class="cart-bottom-sec mt-2">
        <div class="promo-card">
          <h2>🎟️ <span data-i18n="promo_title">Promo kod</span></h2>
          <div class="promo-row">
            <input id="promo-code" type="text" placeholder="Promo kodni kiriting" class="promo-input" />
            <button id="apply-promo" class="promo-btn" data-i18n="promo_apply">Qo'llash</button>
          </div>
        </div>

        <div id="summary-box" class="summary-card"></div>
      </section>
    </main>

    <!-- ══ BOTTOM NAV ══ -->
    <nav class="fixed bottom-0 left-0 right-0 z-50 border border-white/10 glass-soft backdrop-blur md:hidden">
      <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-3 text-xs text-white/70">
        <a href="index.html" class="flex flex-col items-center gap-1">
          <span>🏠</span>
          <span data-i18n="home"></span>
        </a>
        <a href="catalog.html" class="flex flex-col items-center gap-1">
          <span>🛍️</span>
          <span data-i18n="catalog"></span>
        </a>
        <a href="cart.html" class="relative flex flex-col items-center gap-1 text-white">
          <span>🛒</span>
          <span data-i18n="cart"></span>
          <span class="absolute -right-2 -top-1 flex h-5 w-5 items-center justify-center rounded-full bg-white text-[10px] font-semibold text-slate-900" data-cart-count>0</span>
        </a>
        <a href="account.html" class="flex flex-col items-center gap-1">
          <span>👤</span>
          <span data-i18n="account"></span>
        </a>
      </div>
    </nav>

    <script type="module" src="js/cart.js"></script>
  </body>
</html>
