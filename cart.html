<!DOCTYPE html>
<html lang="uz" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kawai Shop — Savat</title>
    <link rel="stylesheet" href="css/output.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <style>
      .logo-text {
        background: linear-gradient(135deg, #f9a8d4, #e11d84, #c026d3);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text; font-weight: 900; letter-spacing: -0.02em;
      }

      /* ── Heading ── */
      .cart-hd {
        padding: 12px 0 10px;
        display: flex; align-items: center; gap: 10px;
        border-bottom: 1px solid rgba(255,180,210,.08);
        margin-bottom: 4px;
      }
      .cart-hd h1 { font-size: 19px; font-weight: 900; color: #fff; letter-spacing: -.02em; }
      .cart-count-badge {
        background: linear-gradient(135deg, #e11d84, #f472b6);
        border-radius: 999px; padding: 2px 11px;
        font-size: 11px; font-weight: 800; color: #fff;
        box-shadow: 0 2px 8px rgba(225,29,132,.32);
      }

      /* ── Empty state ── */
      .cart-empty {
        text-align: center; padding: 56px 20px;
        background:
          linear-gradient(180deg, rgba(255,180,210,.04), rgba(255,180,210,.01)),
          linear-gradient(180deg, rgba(24,8,36,.65), rgba(10,4,18,.70));
        border: 1px solid rgba(225,29,132,.12);
        border-radius: 24px;
        backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      }
      .cart-empty .ico { font-size: 54px; display: block; margin-bottom: 14px; }
      .cart-empty-ttl { font-size: 17px; font-weight: 900; color: #fff; }
      .cart-empty-sub { font-size: 13px; color: rgba(255,200,230,.42); margin-top: 6px; }
      .cart-empty-btn {
        display: inline-block; margin-top: 20px;
        background: linear-gradient(135deg, #e11d84, #f472b6);
        border-radius: 14px; padding: 11px 28px;
        font-size: 13px; font-weight: 800; color: #fff; text-decoration: none;
        box-shadow: 0 6px 20px rgba(225,29,132,.32);
        transition: filter .17s, transform .17s;
      }
      .cart-empty-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }

      /* ── Cart item ── */
      .cart-item {
        display: flex; gap: 12px; align-items: center;
        padding: 12px; border-radius: 20px;
        background:
          linear-gradient(180deg, rgba(255,180,210,.04), rgba(255,180,210,.01)),
          linear-gradient(180deg, rgba(24,8,36,.65), rgba(10,4,18,.70));
        border: 1px solid rgba(225,29,132,.10);
        backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        margin-bottom: 12px;
        transition: border-color .2s;
      }
      .cart-item:hover { border-color: rgba(244,114,182,.28); }

      .cart-item-img {
        width: 76px; height: 76px; border-radius: 16px;
        background: rgba(255,180,210,.04);
        border: 1px solid rgba(255,180,210,.10);
        flex-shrink: 0; overflow: hidden;
        display: flex; align-items: center; justify-content: center; padding: 6px;
      }
      .cart-item-img img { width: 100%; height: 100%; object-fit: contain; border-radius: 10px; }

      .cart-item-info { flex: 1; min-width: 0; }
      .cart-item-title {
        font-size: 13.5px; font-weight: 800; color: #fff; line-height: 1.3;
        display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      }
      .cart-item-cat { font-size: 11px; color: rgba(255,200,230,.40); margin-top: 3px; }
      .cart-item-variant {
        display: inline-flex; align-items: center; margin-top: 6px;
        padding: 2px 9px; border-radius: 999px;
        background: rgba(225,29,132,.12); border: 1px solid rgba(244,114,182,.22);
        font-size: 10.5px; font-weight: 700; color: #f9a8d4;
      }
      .cart-item-price { font-size: 14px; font-weight: 900; color: #fff; margin-top: 6px; }

      .cart-item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }

      /* ── Qty stepper ── */
      .qty-stepper {
        display: flex; align-items: center;
        background: rgba(255,180,210,.04);
        border: 1px solid rgba(255,180,210,.10);
        border-radius: 12px; overflow: hidden;
      }
      .qty-btn {
        width: 30px; height: 30px;
        display: flex; align-items: center; justify-content: center;
        background: transparent; border: none;
        color: rgba(255,200,230,.70); font-size: 16px; font-weight: 700;
        cursor: pointer; transition: background .15s, color .15s;
      }
      .qty-btn:hover { background: rgba(225,29,132,.15); color: #f472b6; }
      .qty-val { min-width: 28px; text-align: center; font-size: 13px; font-weight: 800; color: #fff; }

      .remove-btn {
        display: flex; align-items: center; gap: 4px;
        font-size: 11px; font-weight: 700; color: #f87171;
        background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.18);
        border-radius: 10px; padding: 5px 10px; cursor: pointer;
        transition: background .17s;
      }
      .remove-btn:hover { background: rgba(239,68,68,.16); }

      /* ── Bottom section ── */
      .cart-bottom-sec { margin-top: 4px; }

      /* ── Promo card ── */
      .promo-card {
        background:
          linear-gradient(180deg, rgba(255,180,210,.04), rgba(255,180,210,.01)),
          linear-gradient(180deg, rgba(24,8,36,.65), rgba(10,4,18,.70));
        border: 1px solid rgba(225,29,132,.10);
        border-radius: 20px; padding: 16px;
        backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        margin-bottom: 12px;
      }
      .promo-card h2 {
        font-size: 13px; font-weight: 800; color: #fff;
        display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
      }
      .promo-row { display: flex; gap: 8px; }
      .promo-input {
        flex: 1;
        background: rgba(255,180,210,.04) !important;
        border: 1px solid rgba(255,180,210,.10) !important;
        border-radius: 12px !important; padding: 11px 14px;
        font-size: 13px; color: #fff !important;
      }
      .promo-input::placeholder { color: rgba(255,200,230,.30); }
      .promo-btn {
        padding: 11px 20px; border-radius: 12px;
        background: linear-gradient(135deg, #e11d84, #f472b6);
        border: none; color: #fff; font-size: 13px; font-weight: 800;
        cursor: pointer; white-space: nowrap;
        transition: filter .17s, transform .17s;
        box-shadow: 0 4px 14px rgba(225,29,132,.30);
      }
      .promo-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }

      /* ── Summary card ── */
      .summary-card {
        background:
          linear-gradient(180deg, rgba(255,180,210,.04), rgba(255,180,210,.01)),
          linear-gradient(180deg, rgba(24,8,36,.65), rgba(10,4,18,.70));
        border: 1px solid rgba(225,29,132,.10);
        border-radius: 20px; padding: 16px;
        backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      }
      .summary-row {
        display: flex; align-items: center; justify-content: space-between;
        padding: 7px 0; font-size: 13px; color: rgba(255,200,230,.60);
      }
      .summary-row .val { font-weight: 700; color: #fff; }
      .summary-row.discount .val { color: #4ade80; }
      .summary-divider { height: 1px; background: rgba(255,180,210,.07); margin: 8px 0; }
      .summary-total {
        display: flex; align-items: center; justify-content: space-between; padding: 6px 0 4px;
      }
      .summary-total .lbl { font-size: 14px; font-weight: 800; color: rgba(255,200,230,.85); }
      .summary-total .val { font-size: 21px; font-weight: 900; color: #fff; letter-spacing: -.01em; }

      .checkout-btn {
        display: flex; align-items: center; justify-content: center; gap: 8px;
        width: 100%; margin-top: 14px; padding: 14px; border-radius: 16px;
        background: linear-gradient(135deg, #be185d, #e11d84, #f472b6);
        font-size: 14px; font-weight: 900; color: #fff; text-decoration: none;
        box-shadow: 0 8px 24px rgba(225,29,132,.38);
        transition: filter .17s, transform .17s;
      }
      .checkout-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }

      #cart-list .skeleton { border-radius: 20px; }
    </style>
      <style id="kc-loader-style">
      #kc-page-loader {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 1.1rem;
        background:
          radial-gradient(800px 500px at 5% 0%, rgba(225,29,132,.18), transparent 55%),
          radial-gradient(600px 400px at 95% 5%, rgba(192,38,211,.12), transparent 50%),
          linear-gradient(180deg, #0f0812 0%, #150d1a 100%);
        transition: opacity .32s ease, visibility .32s ease;
      }
      #kc-page-loader.kc-hidden {
        opacity: 0; visibility: hidden; pointer-events: none;
      }
      .kc-loader-logo {
        font-family: "Fredoka", "Nunito", sans-serif;
        font-size: 1.35rem; font-weight: 700;
        background: linear-gradient(135deg, #ffb3d1, #ff4d8d, #b48cff);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text; letter-spacing: -.01em;
      }
      .kc-spinner-ring { position: relative; width: 54px; height: 54px; }
      .kc-spinner-ring svg {
        position: absolute; inset: 0; width: 100%; height: 100%;
        animation: kc-spin 1s linear infinite;
      }
      .kc-spinner-ring svg circle { fill: none; stroke-width: 3.5; stroke-linecap: round; }
      .kc-spinner-ring svg .kc-track { stroke: rgba(255,180,210,.10); }
      .kc-spinner-ring svg .kc-arc {
        stroke: url(#kc-grad);
        stroke-dasharray: 110 200;
        animation: kc-spin 1s linear infinite, kc-dash .9s ease-in-out infinite alternate;
      }
      @keyframes kc-spin { 100% { transform: rotate(360deg); } }
      @keyframes kc-dash {
        from { stroke-dasharray: 20 200; }
        to   { stroke-dasharray: 120 200; }
      }
      .kc-loader-dots { display: flex; gap: .4rem; }
      .kc-loader-dots span {
        width: 5px; height: 5px; border-radius: 50%;
        background: rgba(255,140,180,.5);
        animation: kc-dot .9s ease-in-out infinite;
      }
      .kc-loader-dots span:nth-child(1) { animation-delay: 0s; }
      .kc-loader-dots span:nth-child(2) { animation-delay: .18s; }
      .kc-loader-dots span:nth-child(3) { animation-delay: .36s; }
      @keyframes kc-dot {
        0%, 100% { transform: scale(.7); opacity: .35; }
        50%       { transform: scale(1.2); opacity: 1; background: #ff4d8d; }
      }
    </style>
  </head>
  <body class="theme-bg text-white">
    <!-- PAGE LOADER -->
    <div id="kc-page-loader" role="status" aria-label="Yuklanmoqda">
      <svg width="0" height="0" style="position:absolute">
        <defs>
          <linearGradient id="kc-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#ffb3d1"/>
            <stop offset="50%"  stop-color="#ff4d8d"/>
            <stop offset="100%" stop-color="#b48cff"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="kc-spinner-ring">
        <svg viewBox="0 0 54 54">
          <circle class="kc-track" cx="27" cy="27" r="23"/>
          <circle class="kc-arc"   cx="27" cy="27" r="23"/>
        </svg>
      </div>
      <div class="kc-loader-logo">🌸 Kawai Shop</div>
      <div class="kc-loader-dots"><span></span><span></span><span></span></div>
    </div>
    <script>
      (function(){
        var el = document.getElementById("kc-page-loader");
        function hide(){ if(el) el.classList.add("kc-hidden"); }
        if(document.readyState === "complete"){ setTimeout(hide, 180); }
        else { window.addEventListener("load", function(){ setTimeout(hide, 220); }); }
        setTimeout(hide, 3500);
      })();
    </script>

    <!-- MOBILE HEADER -->
    <header class="fixed top-0 z-50 flex h-14 w-full items-center px-4 md:hidden glass-soft" style="border-bottom:1px solid rgba(225,29,132,.10);">
      <a href="index.html" class="logo-text text-lg">🌸 Kawai Shop</a>
    </header>

    <!-- DESKTOP HEADER -->
    <header class="hidden md:block glass-soft" style="border-bottom:1px solid rgba(225,29,132,.08);">
      <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
        <a href="index.html" class="logo-text text-xl">🌸 Kawai Shop</a>
        <nav class="flex items-center gap-3 text-sm">
          <a href="index.html" class="text-pink-200/70 hover:text-white" data-i18n="home"></a>
          <a href="catalog.html" class="text-pink-200/70 hover:text-white" data-i18n="catalog"></a>
        </nav>
        <div class="flex items-center gap-4 text-sm">
          <a href="cart.html" class="relative">
            🛍️
            <span class="absolute -right-2 -top-2 flex h-5 w-5 items-center justify-center rounded-full bg-pink-500 text-xs font-semibold text-white" data-cart-count>0</span>
          </a>
          <a href="account.html" class="text-pink-200/70 hover:text-white" data-i18n="account"></a>
          <select data-lang-switch class="rounded-lg border border-slate-800 bg-slate-900 px-2 py-1 text-xs text-white">
            <option value="uz">UZ</option>
            <option value="ru">RU</option>
          </select>
        </div>
      </div>
    </header>

    <main class="bottom-safe mx-auto max-w-6xl px-4 pt-14 pb-8 md:pt-20">

      <div class="cart-hd">
        <h1 data-i18n="cart_title">🛍️ Savat</h1>
        <span class="cart-count-badge" id="cart-count-badge">0</span>
      </div>

      <section class="flex flex-col gap-4 mt-4">
        <div id="empty-state" class="hidden cart-empty">
          <span class="ico">🛍️</span>
          <div class="cart-empty-ttl">Savatingiz bo'sh</div>
          <div class="cart-empty-sub">Katalogga o'tib, sevimli mahsulotlaringizni qo'shing</div>
          <a href="catalog.html" class="cart-empty-btn">✨ Katalogga o'tish</a>
        </div>
        <div id="cart-list"></div>
      </section>

      <section class="cart-bottom-sec mt-2">
        <div class="promo-card">
          <h2>🎀 <span data-i18n="promo_title">Promo kod</span></h2>
          <div class="promo-row">
            <input id="promo-code" type="text" placeholder="Promo kodni kiriting" class="promo-input" />
            <button id="apply-promo" class="promo-btn" data-i18n="promo_apply">Qo'llash</button>
          </div>
        </div>
        <div id="summary-box" class="summary-card"></div>
      </section>
    </main>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav fixed bottom-0 left-0 right-0 z-50 glass-soft md:hidden">
      <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-3 text-xs">
        <a href="index.html" class="nav-item"><span>🏠</span><span data-i18n="home">Bosh</span></a>
        <a href="catalog.html" class="nav-item"><span>🛍️</span><span data-i18n="catalog">Katalog</span></a>
        <a href="cart.html" class="nav-item active text-white relative">
          <span>🛒</span><span data-i18n="cart">Savat</span>
          <span class="absolute -right-2 -top-1 flex h-5 w-5 items-center justify-center rounded-full bg-pink-500 text-[10px] font-semibold text-white" data-cart-count>0</span>
        </a>
        <a href="account.html" class="nav-item"><span>👤</span><span data-i18n="account">Profil</span></a>
      </div>
    </nav>

    <script type="module" src="js/cart.js"></script>
  </body>
</html>
